<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" role="img" aria-label="Code of Conduct - respectful research collaboration">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbfb"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .title { font-size: 40px; font-weight: 800; fill: #0f172a; }
      .tag { font-size: 18px; font-weight: 500; fill: #475569; }
      .label { font-size: 15px; font-weight: 800; fill: #0f172a; }
      .small { font-size: 13px; font-weight: 500; fill: #64748b; }
      .chip { font-size: 14px; font-weight: 700; fill: #134e4a; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="328" rx="18" fill="url(#card)" stroke="#dbe8e8" stroke-width="1.5"/>
  <rect x="28" y="0" width="1144" height="5" rx="2.5" fill="url(#bar)"/>

  <text x="58" y="78" class="title">Code of Conduct</text>
  <text x="58" y="112" class="tag">A calm, credit-first collaboration standard for research tooling.</text>

  <g transform="translate(58,148)">
    <rect width="130" height="38" rx="19" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="65" y="25" text-anchor="middle" class="chip">Respect</text>
  </g>
  <g transform="translate(206,148)">
    <rect width="130" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="65" y="25" text-anchor="middle" class="chip" fill="#1d4ed8">Credit</text>
  </g>
  <g transform="translate(354,148)">
    <rect width="130" height="38" rx="19" fill="#fffbeb" stroke="#fde68a"/>
    <text x="65" y="25" text-anchor="middle" class="chip" fill="#92400e">Privacy</text>
  </g>
  <g transform="translate(502,148)">
    <rect width="130" height="38" rx="19" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="65" y="25" text-anchor="middle" class="chip" fill="#334155">Focus</text>
  </g>

  <g transform="translate(58,218)">
    <rect width="328" height="70" rx="10" fill="#ffffff" stroke="#bae6fd"/>
    <text x="22" y="30" class="label">Welcome behavior</text>
    <text x="22" y="52" class="small">Helpful feedback, clear credit,</text>
    <text x="22" y="68" class="small">and careful privacy.</text>
  </g>
  <g transform="translate(436,218)">
    <rect width="328" height="70" rx="10" fill="#ffffff" stroke="#fed7aa"/>
    <text x="22" y="30" class="label">Not acceptable</text>
    <text x="22" y="52" class="small">Harassment, leaked drafts,</text>
    <text x="22" y="68" class="small">or copyrighted corpora.</text>
  </g>
  <g transform="translate(814,218)">
    <rect width="328" height="70" rx="10" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="22" y="30" class="label">Report privately</text>
    <text x="22" y="52" class="small">Security, conduct, and unpublished research</text>
    <text x="22" y="68" class="small">stay off public issues.</text>
  </g>
</svg>
