<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" role="img" aria-label="Contributing flow - idea to validated pull request">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .title { font-size: 40px; font-weight: 800; fill: #111827; }
      .tag { font-size: 18px; font-weight: 500; fill: #475569; }
      .step { font-size: 16px; font-weight: 800; fill: #ffffff; }
      .body { font-size: 13px; font-weight: 500; fill: #475569; }
      .label { font-size: 15px; font-weight: 800; fill: #0f172a; }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="348" rx="18" fill="url(#panel)" stroke="#dfe7ef" stroke-width="1.5"/>
  <rect x="28" y="0" width="1144" height="5" rx="2.5" fill="url(#bar)"/>

  <text x="58" y="76" class="title">Contributing</text>
  <text x="58" y="110" class="tag">Keep changes focused, public-safe, validated, and easy to review.</text>

  <g transform="translate(58,156)">
    <rect width="230" height="130" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect width="230" height="42" rx="12" fill="#2563eb"/>
    <text x="115" y="27" text-anchor="middle" class="step">1. Pick a lane</text>
    <text x="22" y="70" class="label">Skill, script, docs, CI</text>
    <text x="22" y="94" class="body">Start from one concrete</text>
    <text x="22" y="112" class="body">workflow.</text>
  </g>
  <path d="M313 221 h46 m-10 -7 l10 7 l-10 7" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(384,156)">
    <rect width="230" height="130" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
    <rect width="230" height="42" rx="12" fill="#0f766e"/>
    <text x="115" y="27" text-anchor="middle" class="step">2. Keep it safe</text>
    <text x="22" y="70" class="label">No private artifacts</text>
    <text x="22" y="94" class="body">No paper PDFs, caches,</text>
    <text x="22" y="112" class="body">or secrets.</text>
  </g>
  <path d="M639 221 h46 m-10 -7 l10 7 l-10 7" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(710,156)">
    <rect width="230" height="130" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <rect width="230" height="42" rx="12" fill="#d97706"/>
    <text x="115" y="27" text-anchor="middle" class="step">3. Validate</text>
    <text x="22" y="70" class="label">Run package checks</text>
    <text x="22" y="94" class="body">List skills, compile scripts,</text>
    <text x="22" y="112" class="body">and check links.</text>
  </g>
  <path d="M965 221 h46 m-10 -7 l10 7 l-10 7" stroke="#cbd5e1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(1036,156)">
    <rect width="106" height="130" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="53" y="50" text-anchor="middle" class="label">PR</text>
    <text x="53" y="76" text-anchor="middle" class="body">small</text>
    <text x="53" y="98" text-anchor="middle" class="body">clear</text>
  </g>

  <text x="58" y="322" class="body">Every contribution should preserve citation integrity, copyright safety, attribution, and human author control.</text>
</svg>
